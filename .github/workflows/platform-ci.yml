name: nerve.idp — platform CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io

jobs:

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check backend/
      - run: ruff format --check backend/

  opa-test:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa && sudo mv opa /usr/local/bin/
      - run: opa test policies/ -v

  test-gateway:
    name: Gateway tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: nerve_test
          POSTGRES_USER: nerve
          POSTGRES_PASSWORD: nerve_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        working-directory: backend/gateway
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx
      - name: Run tests
        working-directory: backend/gateway
        env:
          POSTGRES_HOST: localhost
          POSTGRES_DB: nerve_test
          POSTGRES_USER: nerve
          POSTGRES_PASSWORD: nerve_secret
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: [lint, test-gateway]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [gateway, catalog, scaffolding, iac, pipelines, observability, enforcer, blast, ai, docs, quotas]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          target: production
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
